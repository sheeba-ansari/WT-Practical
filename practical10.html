<!DOCTYPE html> 
<html> 
<head> 
    <title>Multi Section Webpage</title> 
</head> 
<body> 
<!-- Navigation Bar --> 
<nav> 
    <a href="#home">Home</a> 
    <a href="#table">Table</a> 
    <a href="#form">Form</a> 
    <a href="#media">Media</a> 
</nav> 
 
<!-- Home Section --> 
<section id="home"> 
    <h1>Welcome</h1> 
    <p>This is a multi-section webpage example.</p> 
</section> 
 
<!-- Table Section --> 
<section id="table"> 
    <h2>Student Data</h2> 
 
    <table> 
        <tr> 
            <th>Name</th> 
            <th>Age</th> 
            <th>Course</th> 
        </tr> 
        <tr> 
            <td>Alice</td> 
            <td>20</td> 
            <td>Computer</td> 
        </tr> 
        <tr> 
            <td>Bob</td> 
            <td>22</td> 
            <td>Science</td> 
        </tr> 
    </table> 
</section> 
 
<!-- Form Section --> 
<section id="form"> 
    <h2>Registration Form</h2> 
 
    <form> 
        Name: <br> 
        <input type="text"><br> 
 
        Email: <br> 
        <input type="email"><br> 
 
        Gender: <br> 
        <input type="radio" name="gender"> Male 
        <input type="radio" name="gender"> Female<br> 
 
        Hobbies: <br> 
        <input type="checkbox"> Music 
        <input type="checkbox"> Sports<br><br> 
 
        <input type="submit" value="Submit"> 
    </form> 
</section> 
 
<!-- Media Section --> 
<section id="media"> 
    <h2>Audio & Video</h2> 
 
    <p>Audio:</p> 
    <audio controls> 
        <source src="sample.mp3" type="audio/mpeg"> 
</audio> 
<p>Video:</p> 
<video width="300" controls> 
<source src="sample.mp4" type="video/mp4"> 
</video> 
</section> 
</body> 
</html>
