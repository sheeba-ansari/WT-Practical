<!DOCTYPE html>
<html>
<head>
 <title> sheeba Practical no 8 </title>
 <style>
 /* Basic body style */
 body {
 margin: 0;
 font-family: Arial;
 background-color: #f2f2f2;
 }
 /* -------- NAVIGATION BAR -------- */
 nav {
 background-color: black;
 text-align: center;
 padding: 15px;
 }
 /* Navbar links in one line */
 nav a {
 color: white;
 text-decoration: none;
 margin: 20px; /* space between links */
 font-weight: bold;
 }
 nav a:hover {
 color: yellow;
 }
 /* -------- SECTIONS -------- */
 section {
 padding: 40px;
 margin: 20px;
 background-color: white;
 border-radius: 8px;
 }
 /* -------- TABLE -------- */
 table {
 width: 100%;
 border-collapse: collapse;
 }
 th, td {
 border: 1px solid black;
 padding: 10px;
 text-align: center;
 }
 /* -------- FORM -------- */
 form {
 display: flex;
 flex-direction: column;
 width: 300px;
 }
 input[type="text"],
 input[type="email"] {
 padding: 8px;
 margin-bottom: 10px;
 }
 input[type="submit"] {
 padding: 8px;
 background-color: black;
 color: white;
 border: none;
 cursor: pointer;
 }
 input[type="submit"]:hover {
 background-color: gray;
 }
 /* -------- MEDIA -------- */
 audio, video {
 width: 100%;
 margin-top: 10px;
 }
 /* -------- RESPONSIVE DESIGN -------- */
 /* Mobile */
 @media (max-width: 600px) {
 section {
 margin: 10px;
 padding: 20px;
 }
 form {
 width: 100%;
 }
 }
 /* Tablet */
 @media (min-width: 601px) and (max-width: 900px) {
 section {
 margin: 15px;
 }
 }
 /* Desktop */
 @media (min-width: 901px) {
 section {
 width: 70%;
 margin: 20px auto;
 }
 }
 </style>
</head>
<body>
<!-- Navigation Bar -->
<nav>
 <a href="#home">Home</a>
 <a href="#table">Table</a>
 <a href="#form">Form</a>
 <a href="#media">Media</a>
</nav>
<!-- Home Section -->
<section id="home">
 <h1>Welcome</h1>
 <p>This is a beginner friendly multi-section webpage.</p>
</section>
<!-- Table Section -->
<section id="table">
 <h2>Student Data</h2>
 <table>
 <tr>
 <th>Name</th>
 <th>Age</th>
 <th>Course</th>
 </tr>
 <tr>
 <td>Alice</td>
 <td>20</td>
 <td>Computer</td>
 </tr>
 <tr>
 <td>Bob</td>
 <td>22</td>
 <td>Science</td>
 </tr>
 </table>
</section>
<!-- Form Section -->
<section id="form">
 <h2>Registration Form</h2>
 <form>
 <input type="text" placeholder="Enter Name">
 <input type="email" placeholder="Enter Email">
 Gender:
 <label><input type="radio" name="gender"> Male</label>
 <label><input type="radio" name="gender"> Female</label>
 Hobbies:
 <label><input type="checkbox"> Music</label>
 <label><input type="checkbox"> Sports</label>
 <input type="submit" value="Submit">
 </form>
</section>
<!-- Media Section -->
<section id="media">
 <h2>Audio & Video</h2>
 <audio controls>
 <source src="sample.mp3" type="audio/mpeg">
 </audio>
 <video controls>
 <source src="sample.mp4" type="video/mp4">
 </video>
</section>
<script>
// -------- EVENT HANDLING (Click) --------
// Change heading text when Home section is clicked
document.querySelector("#home h1").addEventListener("click", function() {
 this.innerHTML = "You Clicked The Heading!";
});
// -------- EVENT HANDLING (Mouseover) --------
// Change heading color on mouseover
document.querySelector("#home h1").addEventListener("mouseover", function() {
 this.style.color = "blue";
});
// -------- FORM VALIDATION --------
document.querySelector("form").addEventListener("submit", function(event) {
 let name = document.querySelector('input[type="text"]').value;
 let email = document.querySelector('input[type="email"]').value;
 // Check required fields
 if (name === "" || email === "") {
 alert("Please fill all required fields!");
 event.preventDefault(); // Stop form submission
 return;
 }
 // Email format check
 if (!email.includes("@") || !email.includes(".")) {
 alert("Please enter a valid email!");
 event.preventDefault();
 return;
 }
 alert("Form submitted successfully!");
 event.preventDefault(); // Stop page refresh (for demo)
});
// -------- DOM MANIPULATION --------
// Change video size dynamically after 3 seconds
setTimeout(function() {
 document.querySelector("video").style.border = "5px solid brown";
}, 3000);
</script>
</body>
</html>
